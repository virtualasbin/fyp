<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #eef2ff;
        color: #111827;
      }
      .card {
        max-width: 420px;
        margin: 24px;
        padding: 24px;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      p {
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>The app shell is still available, and cached task data can be shown when you return to the main app.</p>
      <p>Reconnect to sync new changes with the server.</p>
    </div>
  </body>
</html>
